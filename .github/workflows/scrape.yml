name: Scheduled FIFA Fantasy Data Scrape

on:
  schedule:
    - cron: '0 * * * *'  # every hour, on the hour (UTC)
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: fifa-fantasy-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run scraper (players + squads + matches + rounds + stats)
        run: node scraper.js --with-stats

      - name: Commit and push data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit."
          else
            git commit -m "chore: scheduled data sync $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
