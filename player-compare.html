<style>
  .wrap { max-width: 1200px; margin: 0 auto; padding: 24px 16px 60px; }
  h1 { font-size: 20px; margin: 0; }

  .hero {
    background: linear-gradient(135deg, var(--panel) 0%, var(--panel2) 100%);
    border: 1px solid var(--border); border-radius: 16px;
    padding: 28px 28px 24px; margin-bottom: 22px; position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 85% 0%, var(--pitch-line) 0%, transparent 55%);
    pointer-events: none;
  }
  .hero-kicker { display: inline-flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .08em; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
  .hero-kicker::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); display: inline-block; animation: pulseDot 1.6s ease-in-out infinite; }
  @keyframes pulseDot { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
  .hero h1 { font-size: 30px; font-weight: 900; letter-spacing: -0.02em; margin: 0 0 6px; display: block; }
  .hero p { color: var(--text-dim); font-size: 14px; margin: 0; max-width: 680px; }

  .picker-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
  .picker-slot {
    flex: 1; min-width: 180px; background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px;
  }
  .picker-slot select {
    width: 100%; background: var(--panel2); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 8px 10px; font-size: 13px;
  }
  .picker-slot .picker-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: .04em; color: var(--text-dim); margin-bottom: 6px; }

  .empty-msg { color: var(--text-dim); font-size: 13px; padding: 8px 2px; }

  .cmp-table-wrap { overflow-x: auto; }
  table.cmp { width: 100%; border-collapse: collapse; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; min-width: 600px; }
  table.cmp th, table.cmp td { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 13px; white-space: nowrap; }
  table.cmp th.row-label { text-align: left; color: var(--text-dim); font-size: 11.5px; text-transform: uppercase; letter-spacing: .03em; background: var(--panel2); position: sticky; left: 0; }
  table.cmp td.player-col { text-align: center; font-family: 'JetBrains Mono', monospace; }
  table.cmp th.player-head { text-align: center; cursor: pointer; background: var(--panel2); }
  table.cmp th.player-head:hover { color: var(--accent2); }
  table.cmp th.player-head .ph-name { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 13.5px; color: var(--text); }
  table.cmp th.player-head .ph-team { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); }
  table.cmp tr:last-child td, table.cmp tr:last-child th { border-bottom: none; }
  td.best-value { color: var(--accent); font-weight: 700; }
</style>

<body>
<div class="wrap">
  <div class="page-header">
    <nav class="top-nav"></nav>
    <button class="toggle" id="themeToggle">☀ / ☾</button>
  </div>

  <div class="hero">
    <span class="hero-kicker" data-i18n="playerCompare.kicker">Head-to-Head</span>
    <h1 data-i18n="playerCompare.heroTitle">Player Compare</h1>
    <p data-i18n="playerCompare.heroSubtitle">Pick up to 5 players to compare price, points, form, and full stat breakdown side by side. Click a player name or team code for full details.</p>
  </div>

  <div class="picker-row" id="pickerRow"></div>

  <div class="cmp-table-wrap">
    <table class="cmp" id="cmpTable" style="display:none;">
      <thead><tr id="cmpHeadRow"></tr></thead>
      <tbody id="cmpBody"></tbody>
    </table>
    <div class="empty-msg" id="cmpEmpty" data-i18n="playerCompare.emptyMsg">Select at least 2 players above to compare.</div>
  </div>
</div>

<script src="i18n.js"></script>
<script src="searchable-select.js"></script>
<script src="nav.js"></script>
<script src="flags.js"></script>
<script src="brand.js"></script>
<script src="player-photo.js"></script>
<script src="detail-modal.js"></script>
<script src="footer.js"></script>
<script>
const MAX_SLOTS = 5;
let players = [];
let squads = [];
let aggregates = {};
let selectedIds = [null, null, null, null, null];

const root = document.documentElement;
function setTheme(t) {
  root.setAttribute('data-theme', t);
  localStorage.setItem('fifa-fantasy-theme', t);
}
setTheme(localStorage.getItem('fifa-fantasy-theme') || 'dark');
document.getElementById('themeToggle').addEventListener('click', () => {
  setTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
});

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function squadAbbr(squadId) {
  return squads.find((s) => s.id === squadId)?.abbr ?? '?';
}

function flatten(p) {
  const agg = aggregates[p?.id] || {};
  return {
    id: p?.id,
    fifaId: p?.fifaId ?? null,
    name: [p?.firstName, p?.lastName].filter(Boolean).join(' ') || p?.knownName || `#${p?.id ?? '?'}`,
    squadId: p?.squadId ?? null,
    position: p?.position ?? '—',
    price: Number(p?.price ?? 0),
    totalPoints: p?.stats?.totalPoints ?? 0,
    form: Number(p?.stats?.form ?? 0),
    avgPoints: Number(p?.stats?.avgPoints ?? 0),
    percentSelected: Number(p?.percentSelected ?? 0),
    goals: agg.GS ?? 0,
    assists: agg.AS ?? 0,
    cleanSheets: agg.CS ?? 0,
    tackles: agg.T ?? 0,
    keyPasses: agg.CC ?? 0,
    shots: agg.ST ?? 0,
  };
}

const ROWS = [
  { key: 'position', titleKey: 'playerCompare.rowPosition', isNum: false },
  { key: 'price', titleKey: 'playerCompare.rowPrice', isNum: true, fmt: (v) => v.toFixed(1) },
  { key: 'totalPoints', titleKey: 'playerCompare.rowTotalPoints', isNum: true },
  { key: 'avgPoints', titleKey: 'playerCompare.rowAvgPoints', isNum: true, fmt: (v) => v.toFixed(1) },
  { key: 'form', titleKey: 'playerCompare.rowForm', isNum: true, fmt: (v) => v.toFixed(1) },
  { key: 'percentSelected', titleKey: 'playerCompare.rowSelected', isNum: true, fmt: (v) => `${v.toFixed(1)}%` },
  { key: 'goals', titleKey: 'playerCompare.rowGoals', isNum: true },
  { key: 'assists', titleKey: 'playerCompare.rowAssists', isNum: true },
  { key: 'cleanSheets', titleKey: 'playerCompare.rowCleanSheets', isNum: true },
  { key: 'tackles', titleKey: 'playerCompare.rowTackles', isNum: true },
  { key: 'keyPasses', titleKey: 'playerCompare.rowKeyPasses', isNum: true },
  { key: 'shots', titleKey: 'playerCompare.rowShots', isNum: true },
];

async function loadData() {
  try {
    const [playersRes, squadsRes, aggRes] = await Promise.all([
      fetch('data/players.json'),
      fetch('data/squads.json'),
      fetch('data/player_aggregates.json'),
    ]);
    if (!playersRes.ok) throw new Error(`HTTP ${playersRes.status}`);
    const json = await playersRes.json();
    squads = squadsRes.ok ? await squadsRes.json() : [];
    aggregates = aggRes.ok ? await aggRes.json() : {};
    players = (Array.isArray(json) ? json : []).map(flatten).map((p) => ({ ...p, squadAbbr: squadAbbr(p.squadId) }));
    players.sort((a, b) => b.totalPoints - a.totalPoints);
  } catch (e) {
    document.getElementById('pickerRow').innerHTML = `<div class="empty-msg">${I18N.t('common.errLoadData')} ${escapeHtml(String(e.message || e))}.</div>`;
    return;
  }
  // Pre-fill the first two slots with the top 2 players by points so the
  // page shows something useful immediately.
  selectedIds[0] = players[0]?.id ?? null;
  selectedIds[1] = players[1]?.id ?? null;
  renderPicker();
  renderTable();
}

let pickerWidgets = [];

function renderPicker() {
  const row = document.getElementById('pickerRow');
  row.innerHTML = '';
  pickerWidgets = [];
  const optionList = players.map((p) => ({ value: p.id, label: `${p.name} (${p.squadAbbr})` }));

  for (let i = 0; i < MAX_SLOTS; i++) {
    const slot = document.createElement('div');
    slot.className = 'picker-slot';
    const label = document.createElement('div');
    label.className = 'picker-label';
    label.textContent = `${I18N.t('playerCompare.slotLabel', 'Player')} ${i + 1}`;
    slot.appendChild(label);

    const selectHost = document.createElement('div');
    slot.appendChild(selectHost);
    row.appendChild(slot);

    const widget = SearchableSelect.create(selectHost, {
      options: optionList,
      value: selectedIds[i] ?? '',
      placeholder: I18N.t('playerCompare.slotEmpty', '— None —'),
      noResultsText: I18N.t('playerCompare.noResults', 'No matching players'),
      onChange: (v) => {
        selectedIds[i] = v ? Number(v) : null;
        renderTable();
      },
    });
    pickerWidgets.push(widget);
  }
}

function renderTable() {
  const chosen = selectedIds
    .map((id) => players.find((p) => p.id === id))
    .filter(Boolean);

  const table = document.getElementById('cmpTable');
  const emptyMsg = document.getElementById('cmpEmpty');

  if (chosen.length < 2) {
    table.style.display = 'none';
    emptyMsg.style.display = 'block';
    return;
  }
  table.style.display = 'table';
  emptyMsg.style.display = 'none';

  const headRow = document.getElementById('cmpHeadRow');
  headRow.innerHTML = `<th class="row-label">${escapeHtml(I18N.t('playerCompare.rowLabel', 'Stat'))}</th>` +
    chosen.map((p) => `
      <th class="player-head" onclick="DetailModal.openPlayer(${p.id})">
        <div>${PlayerPhoto.html(p.fifaId, p.name, 40)}</div>
        <div class="ph-name">${FLAGS.flagFor(p.squadAbbr)} ${escapeHtml(p.name)}</div>
        <div class="ph-team">${escapeHtml(p.squadAbbr)} · ${escapeHtml(p.position)}</div>
      </th>
    `).join('');

  const body = document.getElementById('cmpBody');
  body.innerHTML = ROWS.map((row) => {
    const values = chosen.map((p) => p[row.key]);
    const best = row.isNum ? Math.max(...values) : null;
    const cells = chosen.map((p) => {
      const raw = p[row.key];
      const display = row.fmt ? row.fmt(raw) : raw;
      const isBest = row.isNum && raw === best && best > 0;
      return `<td class="player-col${isBest ? ' best-value' : ''}">${escapeHtml(String(display))}</td>`;
    }).join('');
    return `<tr><th class="row-label">${escapeHtml(I18N.t(row.titleKey))}</th>${cells}</tr>`;
  }).join('');
}

document.addEventListener('i18n:change', () => {
  renderPicker();
  renderTable();
});

loadData();
</script>
</body>
</html>
