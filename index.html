<style>
  .wrap { max-width: 1200px; margin: 0 auto; padding: 24px 16px 60px; }
  h1 { font-size: 20px; margin: 0 0 16px; display: flex; align-items: center; gap: 12px; }

  .hero {
    background: linear-gradient(135deg, var(--panel) 0%, var(--panel2) 100%);
    border: 1px solid var(--border); border-radius: 16px;
    padding: 28px 28px 24px; margin-bottom: 22px; position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 85% 0%, var(--pitch-line) 0%, transparent 55%);
    pointer-events: none;
  }
  .hero-kicker { display: inline-flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .08em; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
  .hero-kicker::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); display: inline-block; animation: pulseDot 1.6s ease-in-out infinite; }
  @keyframes pulseDot { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
  .hero h1 { font-size: 32px; font-weight: 900; letter-spacing: -0.02em; margin: 0 0 6px; display: block; }
  .hero p { color: var(--text-dim); font-size: 14px; margin: 0 0 18px; max-width: 680px; }
  .hero-stats { display: flex; gap: 14px; flex-wrap: wrap; }
  .hero-stat { background: rgba(0,0,0,0.18); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; min-width: 130px; }
  :root[data-theme="light"] .hero-stat { background: rgba(255,255,255,0.5); }
  .hero-stat .label { font-size: 10.5px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-dim); }
  .hero-stat .value { font-family: 'JetBrains Mono', monospace; font-size: 19px; font-weight: 700; color: var(--accent); }

  .lb-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 16px; }
  .lb-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
  .lb-head { padding: 12px 14px; border-bottom: 1px solid var(--border); background: var(--panel2); font-size: 13px; font-weight: 800; font-family: 'Bricolage Grotesque', sans-serif; }
  .lb-top1 {
    display: flex; align-items: center; gap: 10px; padding: 14px;
    cursor: pointer; border-bottom: 1px solid var(--border);
  }
  .lb-top1:hover { background: var(--row-hover); }
  .lb-top1 .lb-rank { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 900; color: var(--accent); width: 26px; text-align: center; flex-shrink: 0; }
  .lb-top1 .lb-name { font-weight: 800; font-size: 14.5px; }
  .lb-top1 .lb-team { font-size: 11.5px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
  .lb-top1 .lb-value { margin-left: auto; text-align: right; font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--accent2); font-size: 16px; flex-shrink: 0; }
  .lb-top1 .lb-value small { display: block; font-size: 9.5px; color: var(--text-dim); font-weight: 400; text-transform: uppercase; letter-spacing: .03em; }
  .lb-rest { padding: 4px 0; }
  .lb-row { display: flex; align-items: center; gap: 8px; padding: 6px 14px; font-size: 12.5px; cursor: pointer; }
  .lb-row:hover { background: var(--row-hover); }
  .lb-row .lb-rank { width: 18px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; flex-shrink: 0; }
  .lb-row .lb-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lb-row .lb-value { font-family: 'JetBrains Mono', monospace; color: var(--text-dim); flex-shrink: 0; }
  .empty-msg { color: var(--text-dim); font-size: 13px; padding: 8px 2px; }

<body>
<div class="wrap">
  <div class="page-header">
    <nav class="top-nav"></nav>
    <button class="toggle" id="themeToggle">☀ / ☾</button>
  </div>

  <div class="hero">
    <span class="hero-kicker" data-i18n="index.kicker">Live · Tournament Dashboard</span>
    <h1 data-i18n="index.heroTitle">FIFA Fantasy Dashboard</h1>
    <p data-i18n="index.heroSubtitle">Pemuncak statistik turnamen sekilas — poin, gol, dan statistik bertahan ter-update dari data scrape. Klik nama pemain atau tim untuk detail lengkap. Cari daftar lengkap pemain? Buka menu Pemain.</p>
    <div class="hero-stats" id="heroStats"></div>
  </div>

  <div class="lb-grid" id="lbGrid"></div>
</div>

<script src="i18n.js"></script>
<script src="nav.js"></script>
<script src="flags.js"></script>
<script src="brand.js"></script>
<script src="detail-modal.js"></script>
<script src="footer.js"></script>
<script>
let players = [];
let squads = [];
let aggregates = {};

const root = document.documentElement;

function setTheme(t) {
  root.setAttribute('data-theme', t);
  localStorage.setItem('fifa-fantasy-theme', t);
}
setTheme(localStorage.getItem('fifa-fantasy-theme') || 'dark');
document.getElementById('themeToggle').addEventListener('click', () => {
  setTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
});

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function squadAbbr(squadId) {
  return squads.find((s) => s.id === squadId)?.abbr ?? '?';
}

function flatten(p) {
  const agg = aggregates[p?.id] || {};
  return {
    id: p?.id,
    name: [p?.firstName, p?.lastName].filter(Boolean).join(' ') || p?.knownName || `#${p?.id ?? '?'}`,
    squadId: p?.squadId ?? null,
    position: p?.position ?? '—',
    status: p?.status ?? 'unknown',
    totalPoints: p?.stats?.totalPoints ?? 0,
    form: Number(p?.stats?.form ?? 0),
    avgPoints: Number(p?.stats?.avgPoints ?? 0),
    percentSelected: Number(p?.percentSelected ?? 0),
    goals: agg.GS ?? 0,
    assists: agg.AS ?? 0,
    cleanSheets: agg.CS ?? 0,
    tackles: agg.T ?? 0,
    keyPasses: agg.CC ?? 0,
    shots: agg.ST ?? 0,
  };
}

async function loadData() {
  const lbGrid = document.getElementById('lbGrid');
  try {
    const [playersRes, squadsRes, aggRes] = await Promise.all([
      fetch('data/players.json'),
      fetch('data/squads.json'),
      fetch('data/player_aggregates.json'),
    ]);
    if (!playersRes.ok) throw new Error(`HTTP ${playersRes.status}`);
    const json = await playersRes.json();
    squads = squadsRes.ok ? await squadsRes.json() : [];
    aggregates = aggRes.ok ? await aggRes.json() : {};
    players = (Array.isArray(json) ? json : []).map(flatten).map((p) => ({ ...p, squadAbbr: squadAbbr(p.squadId) }));
  } catch (e) {
    lbGrid.innerHTML = `<div class="empty-msg">Gagal memuat data: ${escapeHtml(String(e.message || e))}. Jalankan "node scraper.js" dulu, lalu akses via http server.</div>`;
    return;
  }
  renderHeroStats();
  renderLeaderboards();
}

function renderHeroStats() {
  const playingCount = players.filter((p) => p.status === 'playing').length;
  document.getElementById('heroStats').innerHTML = `
    <div class="hero-stat"><div class="label">${I18N.t('index.statTotalPlayers')}</div><div class="value">${players.length}</div></div>
    <div class="hero-stat"><div class="label">${I18N.t('index.statPlaying')}</div><div class="value">${playingCount}</div></div>
  `;
}

const LEADERBOARDS = [
  { key: 'totalPoints', titleKey: 'index.lbTotalPoints', unitKey: 'index.unitPts', format: (v) => v },
  { key: 'avgPoints', titleKey: 'index.lbAvgPoints', unitKey: 'index.unitPts', format: (v) => v.toFixed(1) },
  { key: 'form', titleKey: 'index.lbForm', unitKey: 'index.unitPts', format: (v) => v.toFixed(1) },
  { key: 'percentSelected', titleKey: 'index.lbSelected', unitKey: '', format: (v) => `${v.toFixed(1)}%` },
  { key: 'goals', titleKey: 'index.lbGoals', unitKey: 'index.unitGoals', format: (v) => v },
  { key: 'assists', titleKey: 'index.lbAssists', unitKey: 'index.unitAssists', format: (v) => v },
  { key: 'cleanSheets', titleKey: 'index.lbCleanSheets', unitKey: 'index.unitCleanSheets', format: (v) => v },
  { key: 'tackles', titleKey: 'index.lbTackles', unitKey: 'index.unitTackles', format: (v) => v },
  { key: 'keyPasses', titleKey: 'index.lbKeyPasses', unitKey: 'index.unitKeyPasses', format: (v) => v },
  { key: 'shots', titleKey: 'index.lbShots', unitKey: 'index.unitShots', format: (v) => v },
];

function renderLeaderboards() {
  const grid = document.getElementById('lbGrid');
  grid.innerHTML = LEADERBOARDS.map((lb) => {
    const sorted = players.slice().sort((a, b) => b[lb.key] - a[lb.key]);
    const top5 = sorted.slice(0, 5);
    const leader = top5[0];
    if (!leader || leader[lb.key] <= 0) {
      return `<div class="lb-card">
        <div class="lb-head">${escapeHtml(I18N.t(lb.titleKey))}</div>
        <div class="empty-msg" style="padding:14px;">${escapeHtml(I18N.t('index.noStatsYet'))}</div>
      </div>`;
    }
    const unit = lb.unitKey ? escapeHtml(I18N.t(lb.unitKey)) : '';
    const rest = top5.slice(1).map((p, i) => `
      <div class="lb-row" onclick="DetailModal.openPlayer(${p.id})">
        <span class="lb-rank">${i + 2}</span>
        <span class="lb-name">${FLAGS.flagFor(p.squadAbbr)} ${escapeHtml(p.name)}</span>
        <span class="lb-value">${lb.format(leader ? p[lb.key] : 0)}</span>
      </div>
    `).join('');
    return `<div class="lb-card">
      <div class="lb-head">${escapeHtml(I18N.t(lb.titleKey))}</div>
      <div class="lb-top1" onclick="DetailModal.openPlayer(${leader.id})">
        <span class="lb-rank">1</span>
        <div>
          <div class="lb-name">${FLAGS.flagFor(leader.squadAbbr)} ${escapeHtml(leader.name)}</div>
          <div class="lb-team">${escapeHtml(leader.squadAbbr)}</div>
        </div>
        <div class="lb-value">${lb.format(leader[lb.key])}<small>${unit}</small></div>
      </div>
      <div class="lb-rest">${rest}</div>
    </div>`;
  }).join('');
}

document.addEventListener('i18n:change', () => {
  renderHeroStats();
  renderLeaderboards();
});

loadData();
</script>
</body>
