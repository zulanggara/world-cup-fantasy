  .lb-vis-panel summary { cursor: pointer; padding: 10px 0; font-size: 13px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }

<div class="wrap">
  <div class="page-header">
    <nav class="top-nav"></nav>
    <button class="toggle" id="themeToggle">☀ / ☾</button>
  </div>

  <div class="hero">
    <span class="hero-kicker" data-i18n="index.kicker">Live · Tournament Dashboard</span>
    <h1 data-i18n="index.heroTitle">FIFA Fantasy Dashboard</h1>
    <p data-i18n="index.heroSubtitle">Pemuncak statistik turnamen sekilas — poin, gol, dan statistik bertahan ter-update dari data scrape. Klik nama pemain atau tim untuk detail lengkap. Cari daftar lengkap pemain? Buka menu Pemain.</p>
    <div class="hero-stats" id="heroStats"></div>
  </div>

  <details class="lb-vis-panel">
    <summary data-i18n="index.visToggleLabel">Tampilkan/Sembunyikan Kategori</summary>
    <div class="lb-vis-groups" id="lbVisibility"></div>
  </details>

  <div class="lb-grid" id="lbGrid"></div>
</div>

<script>
let players = [];
let squads = [];
let aggregates = {};

const root = document.documentElement;

function setTheme(t) {
  root.setAttribute('data-theme', t);
  localStorage.setItem('fifa-fantasy-theme', t);
}
setTheme(localStorage.getItem('fifa-fantasy-theme') || 'dark');
document.getElementById('themeToggle').addEventListener('click', () => {
  setTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
});

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function squadAbbr(squadId) {
  return squads.find((s) => s.id === squadId)?.abbr ?? '?';
}

function flatten(p) {
  const agg = aggregates[p?.id] || {};
  return {
    id: p?.id,
    fifaId: p?.fifaId ?? null,
    name: [p?.firstName, p?.lastName].filter(Boolean).join(' ') || p?.knownName || `#${p?.id ?? '?'}`,
    squadId: p?.squadId ?? null,
    position: p?.position ?? '—',
    status: p?.status ?? 'unknown',
    totalPoints: p?.stats?.totalPoints ?? 0,
    form: Number(p?.stats?.form ?? 0),
    avgPoints: Number(p?.stats?.avgPoints ?? 0),
    percentSelected: Number(p?.percentSelected ?? 0),
    goals: agg.GS ?? 0,
    assists: agg.AS ?? 0,
    cleanSheets: agg.CS ?? 0,
    tackles: agg.T ?? 0,
    keyPasses: agg.CC ?? 0,
    shots: agg.ST ?? 0,
    minutesPlayed: agg.MP ?? 0,
    penaltyWon: agg.PW ?? 0,
    penaltyConceded: agg.PC ?? 0,
    penaltySaved: agg.PS ?? 0,
    freeKicks: agg.FK ?? 0,
    ownGoals: agg.OG ?? 0,
    yellowCards: agg.YC ?? 0,
    redCards: agg.RC ?? 0,
    startingXI: agg.SXI ?? 0,
  };
}

async function loadData() {
  const lbGrid = document.getElementById('lbGrid');
  try {
    const [playersRes, squadsRes, aggRes] = await Promise.all([
      fetch('data/players.json'),
      fetch('data/squads.json'),
      fetch('data/player_aggregates.json'),
    ]);
    if (!playersRes.ok) throw new Error(`HTTP ${playersRes.status}`);
    const json = await playersRes.json();
    squads = squadsRes.ok ? await squadsRes.json() : [];
    aggregates = aggRes.ok ? await aggRes.json() : {};
    players = (Array.isArray(json) ? json : []).map(flatten).map((p) => ({ ...p, squadAbbr: squadAbbr(p.squadId) }));
  } catch (e) {
    lbGrid.innerHTML = `<div class="empty-msg">${I18N.t('common.errLoadData')} ${escapeHtml(String(e.message || e))}. ${I18N.t('common.errRunScraperHint')}</div>`;
    return;
  }
  renderHeroStats();
  renderVisibilityControls();
  renderLeaderboards();
}

function renderHeroStats() {
  const playingCount = players.filter((p) => p.status === 'playing').length;
  document.getElementById('heroStats').innerHTML = `
    <div class="hero-stat"><div class="label">${I18N.t('index.statTotalPlayers')}</div><div class="value">${players.length}</div></div>
    <div class="hero-stat"><div class="label">${I18N.t('index.statPlaying')}</div><div class="value">${playingCount}</div></div>
  `;
}

// Grouped by theme, most-commonly-checked groups first (overall fantasy
// stats, then attacking, then defending/goalkeeping, then playing time,
// then discipline) so related cards (e.g. yellow/red cards) sit next to
// each other instead of in insertion order.
const LEADERBOARD_GROUPS = [
  {
    groupKey: 'overall',
    items: [
      { key: 'totalPoints', titleKey: 'index.lbTotalPoints', unitKey: 'index.unitPts', format: (v) => v },
      { key: 'avgPoints', titleKey: 'index.lbAvgPoints', unitKey: 'index.unitPts', format: (v) => v.toFixed(1) },
      { key: 'form', titleKey: 'index.lbForm', unitKey: 'index.unitPts', format: (v) => v.toFixed(1) },
      { key: 'percentSelected', titleKey: 'index.lbSelected', unitKey: '', format: (v) => `${v.toFixed(1)}%` },
    ],
  },
  {
    groupKey: 'attacking',
    items: [
      { key: 'goals', titleKey: 'index.lbGoals', unitKey: 'index.unitGoals', format: (v) => v },
      { key: 'assists', titleKey: 'index.lbAssists', unitKey: 'index.unitAssists', format: (v) => v },
      { key: 'keyPasses', titleKey: 'index.lbKeyPasses', unitKey: 'index.unitKeyPasses', format: (v) => v },
      { key: 'shots', titleKey: 'index.lbShots', unitKey: 'index.unitShots', format: (v) => v },
      { key: 'penaltyWon', titleKey: 'index.lbPenaltyWon', unitKey: 'index.unitPenaltyWon', format: (v) => v },
      { key: 'freeKicks', titleKey: 'index.lbFreeKicks', unitKey: 'index.unitFreeKicks', format: (v) => v },
    ],
  },
  {
    groupKey: 'defending',
    items: [
      { key: 'cleanSheets', titleKey: 'index.lbCleanSheets', unitKey: 'index.unitCleanSheets', format: (v) => v },
      { key: 'tackles', titleKey: 'index.lbTackles', unitKey: 'index.unitTackles', format: (v) => v },
      { key: 'penaltySaved', titleKey: 'index.lbPenaltySaved', unitKey: 'index.unitPenaltySaved', format: (v) => v },
      { key: 'penaltyConceded', titleKey: 'index.lbPenaltyConceded', unitKey: 'index.unitPenaltyConceded', format: (v) => v },
    ],
  },
  {
    groupKey: 'playingTime',
    items: [
      { key: 'minutesPlayed', titleKey: 'index.lbMinutesPlayed', unitKey: 'index.unitMinutes', format: (v) => v },
      { key: 'startingXI', titleKey: 'index.lbStartingXI', unitKey: 'index.unitStartingXI', format: (v) => v },
    ],
  },
  {
    groupKey: 'discipline',
    items: [
      { key: 'yellowCards', titleKey: 'index.lbYellowCards', unitKey: 'index.unitYellowCards', format: (v) => v },
      { key: 'redCards', titleKey: 'index.lbRedCards', unitKey: 'index.unitRedCards', format: (v) => v },
      { key: 'ownGoals', titleKey: 'index.lbOwnGoals', unitKey: 'index.unitOwnGoals', format: (v) => v },
    ],
  },
];
const LEADERBOARDS = LEADERBOARD_GROUPS.flatMap((g) => g.items);

const VISIBILITY_KEY = 'fifa-fantasy-dashboard-hidden-cats';
// FIFA's source data doesn't populate these two stat codes for any player
// yet (every player aggregates to 0) — default them to hidden so the
// dashboard doesn't show a wall of "no data yet" cards. Only applies on a
// user's first visit; once they've touched the visibility panel at all,
// their explicit choice (including re-checking these) is respected.
const DEFAULT_HIDDEN_CATS = ['penaltySaved', 'startingXI'];
function getHiddenCats() {
  const raw = localStorage.getItem(VISIBILITY_KEY);
  if (raw == null) return new Set(DEFAULT_HIDDEN_CATS);
  try {
    return new Set(JSON.parse(raw));
  } catch (e) {
    return new Set(DEFAULT_HIDDEN_CATS);
  }
}
function setHiddenCats(set) {
  localStorage.setItem(VISIBILITY_KEY, JSON.stringify([...set]));
}
let hiddenCats = getHiddenCats();

// Standard "competition ranking": equal values share the same rank and the
// next distinct value's rank skips ahead (1,1,1,4,4,6...), matching how
// sports leaderboards usually present ties.
function withRanks(sorted, key) {
  let rank = 1;
  return sorted.map((p, i) => {
    if (i > 0 && sorted[i - 1][key] !== p[key]) rank = i + 1;
    return { ...p, rank };
  });
}

const TOP_N = 10;

function renderVisibilityControls() {
  const el = document.getElementById('lbVisibility');
  if (!el) return;
  el.innerHTML = LEADERBOARD_GROUPS.map((g) => `
    <div class="lb-vis-group">
      <span class="lb-vis-group-label">${escapeHtml(I18N.t(`index.visGroup_${g.groupKey}`))}</span>
      ${g.items.map((lb) => `
        <label class="lb-vis-item">
          <input type="checkbox" data-cat="${lb.key}" ${hiddenCats.has(lb.key) ? '' : 'checked'} />
          ${escapeHtml(I18N.t(lb.titleKey))}
        </label>
      `).join('')}
    </div>
  `).join('');
  el.querySelectorAll('input[type="checkbox"]').forEach((cb) => {
    cb.addEventListener('change', () => {
      if (cb.checked) hiddenCats.delete(cb.dataset.cat);
      else hiddenCats.add(cb.dataset.cat);
      setHiddenCats(hiddenCats);
      renderLeaderboards();
    });
  });
}

function renderLeaderboards() {
  const grid = document.getElementById('lbGrid');
  grid.innerHTML = LEADERBOARDS.filter((lb) => !hiddenCats.has(lb.key)).map((lb) => {
    const sorted = withRanks(players.slice().sort((a, b) => b[lb.key] - a[lb.key]), lb.key);
    const top10 = sorted.slice(0, TOP_N);
    const leader = top10[0];
    if (!leader || leader[lb.key] <= 0) {
      return `<div class="lb-card">
        <div class="lb-head">${escapeHtml(I18N.t(lb.titleKey))}</div>
        <div class="empty-msg" style="padding:14px;">${escapeHtml(I18N.t('index.noStatsYet'))}</div>
      </div>`;
    }
    const unit = lb.unitKey ? escapeHtml(I18N.t(lb.unitKey)) : '';
    const rest = top10.slice(1).map((p) => `
      <div class="lb-row${p.rank === 1 ? ' lb-row-tied-leader' : ''}" onclick="DetailModal.openPlayer(${p.id})">
        <span class="lb-rank">${p.rank}</span>
        <span class="lb-name">${FLAGS.flagFor(p.squadAbbr)} ${escapeHtml(p.name)}</span>
        <span class="lb-value">${lb.format(p[lb.key])}</span>
      </div>
    `).join('');
    return `<div class="lb-card">
      <div class="lb-head">${escapeHtml(I18N.t(lb.titleKey))}</div>
      <div class="lb-top1" onclick="DetailModal.openPlayer(${leader.id})">
        <span class="lb-rank">1</span>
        ${PlayerPhoto.html(leader.fifaId, leader.name, 36)}
        <div>
          <div class="lb-name">${FLAGS.flagFor(leader.squadAbbr)} ${escapeHtml(leader.name)}</div>
          <div class="lb-team">${escapeHtml(leader.squadAbbr)}</div>
        </div>
        <div class="lb-value">${lb.format(leader[lb.key])}<small>${unit}</small></div>
      </div>
      <div class="lb-rest">${rest}</div>
    </div>`;
  }).join('');
}

document.addEventListener('i18n:change', () => {
  renderHeroStats();
  renderVisibilityControls();
  renderLeaderboards();
});

loadData();
</script>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
